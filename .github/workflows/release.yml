name: Build and Deploy Release

# 1. This tells GitHub to ONLY run this script when you push a version tag (like v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # We use a standard Windows runner because we are compiling a WinForms application
    runs-on: windows-latest

    steps:
    # Step 1: Pull down your source code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up the official .NET SDK environment on the runner
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Updates automatically to the latest patch release

    # Step 3: Clean up and restore NuGet packages (like iText)
    - name: Restore Dependencies
      run: dotnet restore

    # Step 4: 🚀 YOUR MAGIC PUBLISH COMMAND 🚀
    # Point this to the path of your main WinForms .csproj file
    - name: Compile Single Executable Suite
      run: |
        dotnet publish FileRenamer.App/FileRenamer.App.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true -o ./publish

    # Step 5: Automatically create a GitHub Release and upload the solitary .exe file
    - name: Create GitHub Release
      uses: softprops/action-gh-releases@v2
      with:
        files: ./publish/FileRenamer.App.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}